server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Одностраничная статика. HTML не кэшируем, чтобы деплой был виден сразу
    # (шрифты тянутся с Google CDN клиентом — их кэш нас не касается).
    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
