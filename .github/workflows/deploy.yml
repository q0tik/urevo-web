name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-urevo-web
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, macos, urevo-web]
    steps:
      - name: Pull & rebuild container
        run: |
          # launchd даёт урезанный PATH — docker (Docker Desktop) в /usr/local/bin, git в /usr/bin
          export PATH=/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH
          cd ~/Services/urevo-web
          git fetch --all
          git reset --hard origin/main
          cd ~/Services
          docker compose up -d --build urevo-web
